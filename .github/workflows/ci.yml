name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

  compile-smoke:
    name: Compiled-binary smoke (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build compiled binary
        run: bun build ./src/cli.ts ./src/parser/worker.ts --compile --outfile dist/project-brain-ci

      # Same gates as release.yml: sequential selftest + worker-pool selftest.
      # DIAG: lines are excluded from the regression grep — the selftest's own
      # diagnostics legitimately print $bunfs paths on POSIX.
      - name: Smoke test (sequential + pool)
        run: |
          set -u
          BIN="dist/project-brain-ci"
          SMOKE="$(mktemp -d)"
          printf 'export function smoke(a, b){ return a + b; }\n' > "$SMOKE/a.ts"
          set +e
          OUT="$("$BIN" __parse-selftest "$SMOKE/a.ts" 2>&1)"
          set -e
          echo "$OUT"
          if echo "$OUT" | grep -v '^DIAG:' | grep -E 'RuntimeError|\$bunfs' >/dev/null; then
            echo "::error::sequential smoke hit an embedded-asset regression"
            exit 1
          fi
          if ! echo "$OUT" | grep -Eq 'STRUCT_OK [1-9][0-9]*'; then
            echo "::error::sequential smoke did NOT emit STRUCT_OK"
            exit 1
          fi
          set +e
          POUT="$("$BIN" __parse-selftest --pool 2>&1)"
          set -e
          echo "$POUT"
          if echo "$POUT" | grep -v '^DIAG:' | grep -E 'RuntimeError|\$bunfs' >/dev/null; then
            echo "::error::worker-pool smoke hit an embedded-asset regression"
            exit 1
          fi
          if ! echo "$POUT" | grep -Eq 'STRUCT_OK [1-9][0-9]*'; then
            echo "::error::worker-pool smoke did NOT emit STRUCT_OK"
            exit 1
          fi
