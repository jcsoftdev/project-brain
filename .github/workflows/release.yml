name: Release

on:
  push:
    tags:
      - "v*"
  # Allows a manual, tag-free run of build + smoke test (e.g. to validate the
  # Windows worker-path fix in src/parser/pool.ts on real windows-x64/arm64
  # runners) without burning a version tag. Release-creation and publish
  # steps below are gated on `github.ref` actually being a tag, so a
  # workflow_dispatch run exercises build+smoke only and skips those.
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Create release
        id: create
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            node_os: darwin
            node_cpu: arm64
            ext: ""
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            node_os: linux
            node_cpu: x64
            ext: ""
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bun_target: bun-linux-arm64
            node_os: linux
            node_cpu: arm64
            ext: ""
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
            node_os: win32
            node_cpu: x64
            ext: ".exe"
          - os: windows-11-arm
            target: windows-arm64
            bun_target: bun-windows-arm64
            node_os: win32
            node_cpu: arm64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not `latest`) to match the Bun version the multi-entrypoint
          # `--compile` worker-bundling fix (see src/parser/pool.ts) was
          # actually verified against — this project's bun.lock also pins
          # bun-types/@types/bun to 1.3.14. `--compile`'s entrypoint-flattening
          # behavior this fix relies on is an undocumented implementation
          # detail, so silent version drift here is a real regression risk.
          bun-version: "1.3.14"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build binary
        # worker.ts is passed as a SECOND entrypoint so `--compile` bundles the
        # worker-pool parser's FULL module graph (wasm.ts, extract.ts,
        # languages.ts) AND its nested `{ type: "file" }` WASM assets into the
        # binary. Without it the pool path (src/parser/pool.ts) spawns workers
        # that cannot resolve their own imports, silently yielding zero symbols.
        run: bun build ./src/cli.ts ./src/parser/worker.ts --compile --target=${{ matrix.bun_target }} --outfile dist/project-brain-${{ matrix.target }}

      - name: Smoke test native binary
        shell: bash
        # Runs the JUST-BUILT native binary (matrix.os matches matrix.target, so
        # it executes natively) through the hidden `__parse-selftest` hook. That
        # hook initialises the embedded tree-sitter core + a grammar (baked into
        # the `bun build --compile` artifact), parses one .ts file, and prints
        # `STRUCT_OK <count>` — WITHOUT Ollama, the vector store, or SQLite.
        #
        # POSITIVE assertion is the primary gate: graceful degradation means a
        # broken embedded WASM asset no longer crashes `init` (it silently yields
        # zero symbols), so a negative-marker grep alone can pass vacuously. By
        # requiring STRUCT_OK with a count >= 1 we prove the structural layer is
        # actually alive in this platform binary. The narrowed negative grep
        # ($bunfs / RuntimeError) stays as defense-in-depth.
        run: |
          set -u
          BIN="dist/project-brain-${{ matrix.target }}${{ matrix.ext }}"
          chmod +x "$BIN" || true
          SMOKE="$(mktemp -d)"
          printf 'export function smoke(a, b){ return a + b; }\n' > "$SMOKE/a.ts"
          set +e
          OUT="$("$BIN" __parse-selftest "$SMOKE/a.ts" 2>&1)"
          STATUS=$?
          set -e
          echo "exit=$STATUS"
          echo "$OUT"
          # Defense-in-depth: an embedded-asset regression marker is a hard fail.
          if echo "$OUT" | grep -E 'RuntimeError|\$bunfs' >/dev/null; then
            echo "::error::native binary smoke hit an embedded-asset regression (RuntimeError/\$bunfs)"
            exit 1
          fi
          # PRIMARY gate: structural layer must have produced symbols.
          if ! echo "$OUT" | grep -Eq 'STRUCT_OK [1-9][0-9]*'; then
            echo "::error::native binary smoke did NOT emit STRUCT_OK with a nonzero symbol count — structural layer is dead in this binary"
            exit 1
          fi
          rm -rf "$SMOKE"

          # POOL gate: exercise the worker-pool path (src/parser/pool.ts). The
          # sequential check above cannot detect a broken worker entrypoint —
          # this proves the second `--compile` entrypoint (worker.ts) loads its
          # full graph + embedded WASM and extracts symbols inside the binary.
          set +e
          POUT="$("$BIN" __parse-selftest --pool 2>&1)"
          PSTATUS=$?
          set -e
          echo "pool_exit=$PSTATUS"
          echo "$POUT"
          if echo "$POUT" | grep -E 'RuntimeError|\$bunfs' >/dev/null; then
            echo "::error::worker-pool smoke hit an embedded-asset regression (RuntimeError/\$bunfs)"
            exit 1
          fi
          if ! echo "$POUT" | grep -Eq 'STRUCT_OK [1-9][0-9]*'; then
            echo "::error::worker-pool smoke did NOT emit STRUCT_OK — the pool path is dead in this binary"
            exit 1
          fi

      - name: Upload binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/project-brain-${{ matrix.target }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish platform package
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v' (v0.3.7 → 0.3.7)
          mkdir -p platform-pkg/bin
          cp "dist/project-brain-${{ matrix.target }}${{ matrix.ext }}" "platform-pkg/bin/project-brain-native${{ matrix.ext }}"
          chmod +x "platform-pkg/bin/project-brain-native${{ matrix.ext }}" || true
          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'project-brain-${{ matrix.target }}',
              version: process.env.VERSION,
              description: '${{ matrix.target }} binary for project-brain',
              os: ['${{ matrix.node_os }}'],
              cpu: ['${{ matrix.node_cpu }}'],
              license: 'MIT',
              files: ['bin']
            };
            fs.writeFileSync('platform-pkg/package.json', JSON.stringify(pkg, null, 2));
          "
          cd platform-pkg
          if npm view "project-brain-${{ matrix.target }}@${VERSION}" version 2>/dev/null; then
            echo "project-brain-${{ matrix.target }}@${VERSION} already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ github.ref_name }}

  publish-npm:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync optionalDependencies version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if npm view "project-brain@${VERSION}" version 2>/dev/null; then
            echo "project-brain@${VERSION} already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
